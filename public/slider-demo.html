<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terry Transaction Slider</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8faf8;
      color: #1f2937;
    }
    .hero {
      text-align: center;
      padding: 60px 20px 40px;
    }
    .hero h1 { font-size: 2rem; font-weight: 800; margin-bottom: 10px; }
    .hero h1 span { color: #16a34a; }
    .hero p { color: #6b7280; }
    .slider-section {
      padding: 20px 0;
      background: #f0fdf4;
      border-top: 1px solid #dcfce7;
      border-bottom: 1px solid #dcfce7;
    }
    .embed-box {
      max-width: 700px;
      margin: 50px auto;
      padding: 0 20px;
    }
    .embed-box h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; }
    .embed-box pre {
      background: #1f2937;
      color: #d1fae5;
      padding: 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1><span>Terry</span> Transaction Slider</h1>
    <p>Live cashback donaties van onze community</p>
  </div>

  <div class="slider-section">
    <div id="terry-slider"></div>
  </div>

  <div class="embed-box">
    <h2>Embedden op jouw website</h2>
    <pre>&lt;div id="terry-slider"&gt;&lt;/div&gt;
&lt;script src="https://terry-platform.github.io/endorphin-web/terry-slider.js"&gt;&lt;/script&gt;</pre>
  </div>

  <script src="./terry-slider.js"></script>
</body>
</html>
